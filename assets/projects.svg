<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="t d">
  <title id="t">Featured projects</title><desc id="d">Four highlighted GitHub projects in an animated dashboard.</desc>
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff3b1f"/><stop offset=".5" stop-color="#d7ff3f"/><stop offset="1" stop-color="#69e6ff"/></linearGradient><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#313946" opacity=".16"/></pattern></defs>
  <style>.mono{font-family:Consolas,monospace}.sans{font-family:Segoe UI,Arial,sans-serif}.card{fill:#0b0e14;stroke:#343b47;stroke-width:2}.active{animation:a 4s ease-in-out infinite}.d1{animation-delay:1s}.d2{animation-delay:2s}.d3{animation-delay:3s}@keyframes a{0%,100%{stroke:#343b47}50%{stroke:#ff4a1f}}</style>
  <rect width="1200" height="520" fill="#080b11"/><rect x="18" y="18" width="1164" height="484" fill="url(#grid)" stroke="#333b47" stroke-width="2"/>
  <text x="60" y="66" class="mono" fill="#d7ff3f" font-size="18" font-weight="700" letter-spacing="4">PROJECT SIGNALS / 04</text><path d="M275 61H1138" stroke="#333a45" stroke-width="2" stroke-dasharray="10 10"/>

  <g transform="translate(60 102)"><rect class="card active" width="515" height="160" rx="10"/><rect width="8" height="160" fill="#ff4a1f"/><text x="28" y="38" class="mono" fill="#ff7a18" font-size="11" letter-spacing="2">WEB / AUTOMATION</text><text x="28" y="74" class="sans" fill="#f3f5fa" font-size="25" font-weight="800">Attendax</text><text x="28" y="105" class="sans" fill="#9eaabd" font-size="14">Smart attendance management built to reduce</text><text x="28" y="128" class="sans" fill="#9eaabd" font-size="14">manual work and improve reporting.</text><text x="390" y="138" class="mono" fill="#d7ff3f" font-size="11">JAVASCRIPT →</text></g>
  <g transform="translate(625 102)"><rect class="card active d1" width="515" height="160" rx="10"/><rect width="8" height="160" fill="#d7ff3f"/><text x="28" y="38" class="mono" fill="#d7ff3f" font-size="11" letter-spacing="2">MACHINE LEARNING</text><text x="28" y="74" class="sans" fill="#f3f5fa" font-size="22" font-weight="800">Loan Approval Prediction</text><text x="28" y="105" class="sans" fill="#9eaabd" font-size="14">Financial-data classification for faster and</text><text x="28" y="128" class="sans" fill="#9eaabd" font-size="14">more consistent approval decisions.</text><text x="358" y="138" class="mono" fill="#69e6ff" font-size="11">JUPYTER →</text></g>
  <g transform="translate(60 292)"><rect class="card active d2" width="515" height="160" rx="10"/><rect width="8" height="160" fill="#69e6ff"/><text x="28" y="38" class="mono" fill="#69e6ff" font-size="11" letter-spacing="2">AI / HEALTH TECH</text><text x="28" y="74" class="sans" fill="#f3f5fa" font-size="25" font-weight="800">SmartPhysio.ai</text><text x="28" y="105" class="sans" fill="#9eaabd" font-size="14">AI-assisted physiotherapy with pose tracking,</text><text x="28" y="128" class="sans" fill="#9eaabd" font-size="14">posture analysis and rehabilitation guidance.</text><text x="390" y="138" class="mono" fill="#ff7a18" font-size="11">AI SYSTEM →</text></g>
  <g transform="translate(625 292)"><rect class="card active d3" width="515" height="160" rx="10"/><rect width="8" height="160" fill="#c85cff"/><text x="28" y="38" class="mono" fill="#c85cff" font-size="11" letter-spacing="2">CYBERSECURITY</text><text x="28" y="74" class="sans" fill="#f3f5fa" font-size="22" font-weight="800">JSON Vulnerability Detector</text><text x="28" y="105" class="sans" fill="#9eaabd" font-size="14">Parses vulnerability reports and extracts</text><text x="28" y="128" class="sans" fill="#9eaabd" font-size="14">security findings for easier analysis.</text><text x="390" y="138" class="mono" fill="#d7ff3f" font-size="11">PYTHON →</text></g>
  <rect x="60" y="474" width="1080" height="3" fill="url(#g)"/>
</svg>
