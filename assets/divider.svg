<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="74" viewBox="0 0 1200 74" role="img" aria-label="Animated neon divider">
  <defs>
    <linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff3b1f"/><stop offset=".2" stop-color="#ff7a18"/><stop offset=".43" stop-color="#d7ff3f"/><stop offset=".7" stop-color="#69e6ff"/><stop offset="1" stop-color="#c85cff"/></linearGradient>
